font-weight:500;\">{{ effAmountLabel }}{{ freqLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:0.88rem;padding:0.3rem 0;\"><span style=\"color:#6b7280;\">Frequency<\u002Fspan><span style=\"color:#0a1f3d;font-weight:500;\">{{ summaryFreqLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:0.88rem;padding:0.3rem 0;\"><span style=\"color:#6b7280;\">Card<\u002Fspan><span style=\"color:#0a1f3d;font-weight:500;\">•••• {{ cardLast4 }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:0.88rem;padding:0.3rem 0;\"><span style=\"color:#6b7280;\">Receipt to<\u002Fspan><span style=\"color:#0a1f3d;font-weight:500;\">{{ dEmail }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:0.8rem;color:#6b7280;margin:0 auto 1.5rem;max-width:420px;line-height:1.55;\">A receipt has been sent to your email. CaribHealth Foundation, Inc. is a 501(c)(3); contributions are tax-deductible to the extent allowed by law.<\u002Fp>\n            <div style=\"display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;\">\n              <button onclick=\"{{ donateReset }}\" style=\"background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.9rem;font-weight:500;padding:0.75rem 1.5rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">Make another gift<\u002Fbutton>\n              <button onclick=\"{{ goHome }}\" style=\"background:#0a1f3d;color:#fff;border:none;border-radius:3px;font-size:0.9rem;font-weight:500;padding:0.75rem 1.5rem;cursor:pointer;\" style-hover=\"background:#11294a;\">Back to home<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(1.5rem,3vw,2.5rem) clamp(1.25rem,4vw,2rem) clamp(3.5rem,6vw,5rem);\">\n      <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;text-align:center;\">More Ways to Help<\u002Fp>\n      <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.4rem,2.5vw,1.85rem);font-weight:500;line-height:1.25;margin:0 0 2.5rem;color:#0a1f3d;letter-spacing:-0.015em;text-align:center;\">Beyond a donation.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;\">\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:2rem;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;margin-bottom:0.75rem;\">01<\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.1rem;font-weight:600;margin:0 0 0.75rem;color:#0a1f3d;\">Clinical Volunteers<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0 0 1.5rem;\">Licensed physicians, nurses, and allied health professionals are welcomed for missions. Non-clinical roles in logistics and coordination are also available.<\u002Fp>\n          <button onclick=\"{{ volunteerInquiry }}\" style=\"width:100%;background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.85rem;font-weight:500;padding:0.65rem 1.2rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">Volunteer Inquiry<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:2rem;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;margin-bottom:0.75rem;\">02<\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.1rem;font-weight:600;margin:0 0 0.75rem;color:#0a1f3d;\">Institutional Partnerships<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0 0 1.5rem;\">We partner with hospitals, medical schools, and corporations for supply donations, training collaborations, and program funding.<\u002Fp>\n          <button onclick=\"{{ partnerInquiry }}\" style=\"width:100%;background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.85rem;font-weight:500;padding:0.65rem 1.2rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">Partnership Inquiry<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:2rem;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;margin-bottom:0.75rem;\">03<\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.1rem;font-weight:600;margin:0 0 0.75rem;color:#0a1f3d;\">Spread Awareness<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0 0 1.5rem;\">Sharing our mission with colleagues and community groups expands our base of supporters and volunteers. Request an information packet to share.<\u002Fp>\n          <button onclick=\"{{ requestPacket }}\" style=\"width:100%;background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.85rem;font-weight:500;padding:0.65rem 1.2rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">Request Information Packet<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CONTACT ===================== -->\n  <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Contact\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Contact<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Contact us<\u002Fh1>\n        <p style=\"max-width:640px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">For inquiries about volunteering, partnerships, donations, board membership, or media — use the form below or the details provided.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(2.5rem,5vw,4rem);align-items:start;\">\n        <div>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.2rem;font-weight:600;color:#0a1f3d;margin:0 0 1rem;\">Contact information<\u002Fh3>\n          <p style=\"font-size:0.95rem;color:#374151;line-height:1.75;margin:0 0 2rem;\">We aim to respond to all inquiries within two business days. For urgent partnership or media matters, please indicate so in your message.<\u002Fp>\n          <div style=\"display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb;\"><svg width=\"18\" height=\"18\" fill=\"none\" stroke=\"#0a1f3d\" stroke-width=\"1.8\" viewBox=\"0 0 24 24\" style=\"flex-shrink:0;margin-top:2px;\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"><\u002Fpath><polyline points=\"22,6 12,13 2,6\"><\u002Fpolyline><\u002Fsvg><div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.15rem;\">Email<\u002Fdiv><div style=\"font-size:0.9rem;color:#1f2937;\">caribhealthfoundation@gmail.com<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb;\"><svg width=\"18\" height=\"18\" fill=\"none\" stroke=\"#0a1f3d\" stroke-width=\"1.8\" viewBox=\"0 0 24 24\" style=\"flex-shrink:0;margin-top:2px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12,6 12,12 16,14\"><\u002Fpolyline><\u002Fsvg><div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.15rem;\">Response Time<\u002Fdiv><div style=\"font-size:0.9rem;color:#1f2937;\">Within 2 business days<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb;\"><svg width=\"18\" height=\"18\" fill=\"none\" stroke=\"#0a1f3d\" stroke-width=\"1.8\" viewBox=\"0 0 24 24\" style=\"flex-shrink:0;margin-top:2px;\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg><div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.15rem;\">Principal Office<\u002Fdiv><div style=\"font-size:0.9rem;color:#1f2937;\">Orange, Connecticut, USA<br><span style=\"color:#6b7280;font-size:0.82rem;\">Programs across the Caribbean<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:0.75rem;\"><svg width=\"18\" height=\"18\" fill=\"none\" stroke=\"#0a1f3d\" stroke-width=\"1.8\" viewBox=\"0 0 24 24\" style=\"flex-shrink:0;margin-top:2px;\"><path d=\"M9 12h6M9 16h6M9 8h6M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16l-3.5-2-3.5 2-3.5-2L5 21z\"><\u002Fpath><\u002Fsvg><div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.15rem;\">Tax ID<\u002Fdiv><div style=\"font-size:0.9rem;color:#1f2937;\">501(c)(3) · EIN 99-2604475<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <sc-if value=\"{{ cFormOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Full name <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><input value=\"{{ cName }}\" onchange=\"{{ setCName }}\" placeholder=\"First and last name\" style=\"{{ cNameStyle }}\"><sc-if value=\"{{ hasErrCName }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#d9534f;margin:0.35rem 0 0;\">{{ errCName }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Email address <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><input value=\"{{ cEmail }}\" onchange=\"{{ setCEmail }}\" placeholder=\"you@example.com\" style=\"{{ cEmailStyle }}\"><sc-if value=\"{{ hasErrCEmail }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#d9534f;margin:0.35rem 0 0;\">{{ errCEmail }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Organization <span style=\"color:#9ca3af;font-weight:400;\">(optional)<\u002Fspan><\u002Flabel><input value=\"{{ cOrg }}\" onchange=\"{{ setCOrg }}\" placeholder=\"Hospital, clinic, university, or company\" style=\"{{ cOrgStyle }}\"><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Reason for inquiry <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><select value=\"{{ cReason }}\" onchange=\"{{ setCReason }}\" style=\"{{ cReasonStyle }}\"><sc-for list=\"{{ reasonOptions }}\" as=\"opt\" hint-placeholder-count=\"8\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Message <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><textarea value=\"{{ cMessage }}\" onchange=\"{{ setCMessage }}\" placeholder=\"Please provide relevant details about your inquiry…\" style=\"{{ cMessageStyle }}\"><\u002Ftextarea><sc-if value=\"{{ hasErrCMessage }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#d9534f;margin:0.35rem 0 0;\">{{ errCMessage }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n            <button onclick=\"{{ submitContact }}\" style=\"background:#0a1f3d;color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 2rem;cursor:pointer;\" style-hover=\"background:#11294a;\">Submit Inquiry<\u002Fbutton>\n            <p style=\"font-size:0.78rem;color:#6b7280;margin:1rem 0 0;line-height:1.55;\">By submitting, you consent to being contacted regarding your inquiry. We do not share contact information with third parties.<\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ cSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#f0f9f4;border:1px solid #c5e7d3;border-radius:6px;padding:clamp(1.75rem,3vw,2.5rem);text-align:center;\">\n            <div style=\"width:54px;height:54px;border-radius:50%;background:#fff;border:1px solid #c5e7d3;display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;\"><span style=\"color:#1e6e4d;font-size:1.4rem;\">✓<\u002Fspan><\u002Fdiv>\n            <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.25rem;color:#0a1f3d;font-weight:500;margin:0 0 0.5rem;\">Your inquiry has been received.<\u002Fh3>\n            <p style=\"font-size:0.92rem;color:#374151;line-height:1.65;margin:0 auto 1.5rem;max-width:380px;\">Thank you, {{ cName }}. A member of our team will respond to <strong style=\"color:#0a1f3d;\">{{ cEmail }}<\u002Fstrong> within two business days.<\u002Fp>\n            <button onclick=\"{{ resetContact }}\" style=\"background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.88rem;font-weight:500;padding:0.7rem 1.5rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">Send another inquiry<\u002Fbutton>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- PAGE-SLOT -->\n\n  <\u002Fmain>\n\n  <footer style=\"background:#0a1f3d;color:rgba(255,255,255,0.7);padding:clamp(2.75rem,5vw,3.5rem) clamp(1.25rem,4vw,2rem) 2rem;font-size:0.85rem;\">\n    <div style=\"max-width:1100px;margin:0 auto;\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2.5rem;margin-bottom:2.5rem;\">\n        <div style=\"grid-column:1/-1;max-width:340px;\">\n          <div style=\"display:flex;align-items:center;gap:0.6rem;margin-bottom:0.85rem;\">\n            <div style=\"width:32px;height:32px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#0a1f3d;font-family:'IBM Plex Serif',serif;font-weight:600;font-size:1rem;border-bottom:3px solid var(--accent,#b8860b);\">C<\u002Fdiv>\n            <h4 style=\"font-family:'IBM Plex Serif',serif;color:#fff;font-size:1.05rem;font-weight:600;margin:0;\">CaribHealth Foundation<\u002Fh4>\n          <\u002Fdiv>\n          <p style=\"color:rgba(255,255,255,0.6);line-height:1.65;font-size:0.85rem;margin:0 0 1.25rem;\">A 501(c)(3) charitable organization improving access to high-quality medical care for underserved communities across the Caribbean.<\u002Fp>\n          <sc-if value=\"{{ nlDone }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-size:0.85rem;color:var(--accent,#b8860b);margin:0;\">✓ You’re subscribed — thank you for following our work.<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ nlOpen }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <div style=\"font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.55);margin-bottom:0.5rem;\">Get mission updates<\u002Fdiv>\n              <div style=\"display:flex;gap:0.5rem;flex-wrap:wrap;\">\n                <input value=\"{{ nlEmail }}\" onchange=\"{{ setNlEmail }}\" placeholder=\"you@example.com\" style=\"flex:1;min-width:160px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:3px;color:#fff;padding:0.6rem 0.75rem;font-size:0.85rem;outline:none;\">\n                <button onclick=\"{{ submitNewsletter }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.85rem;font-weight:500;padding:0.6rem 1.1rem;cursor:pointer;white-space:nowrap;\">Subscribe<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ nlError }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#f0a0a0;margin:0.5rem 0 0;\">{{ nlError }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div>\n          <h5 style=\"color:#fff;font-size:0.8rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 1rem;\">Organization<\u002Fh5>\n          <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n            <a onclick=\"{{ goAbout }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">About<\u002Fa>\n            <a onclick=\"{{ goPrograms }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Programs<\u002Fa>\n            <a onclick=\"{{ goBoard }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Board &amp; Governance<\u002Fa>\n            <a onclick=\"{{ goStories }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Stories<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h5 style=\"color:#fff;font-size:0.8rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 1rem;\">Engage<\u002Fh5>\n          <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n            <a onclick=\"{{ goInvolve }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Donate<\u002Fa>\n            <a onclick=\"{{ volunteerInquiry }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Volunteer<\u002Fa>\n            <a onclick=\"{{ goEvents }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Missions &amp; Events<\u002Fa>\n            <a onclick=\"{{ goContact }}\" style=\"color:rgba(255,255,255,0.7);text-decoration:none;cursor:pointer;font-size:0.85rem;\" style-hover=\"color:#fff;\">Contact<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,0.1);padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;\">\n        <p style=\"font-size:0.78rem;color:rgba(255,255,255,0.5);margin:0;\">© 2026 CaribHealth Foundation, Inc. &nbsp;·&nbsp; 501(c)(3) &nbsp;·&nbsp; EIN 99-2604475 &nbsp;·&nbsp; Orange, CT<\u002Fp>\n        <p style=\"font-size:0.78rem;color:rgba(255,255,255,0.5);margin:0;\">caribhealthfoundation@gmail.com<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:860},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#b8860b&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heroHeadline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Access to quality medical care for the Caribbean's underserved.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;donationGoal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:25000,&quot;min&quot;:5000,&quot;max&quot;:100000,&quot;step&quot;:1000,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    page: 'home',\n    mobileNav: false,\n    isMobile: false,\n    // donation\n    dStep: 1,\n    dFreq: 'one-time',\n    dAmount: 100,\n    dCustom: '',\n    dDedicate: false,\n    dDedicateName: '',\n    dName: '', dEmail: '', dCard: '', dExp: '', dCvc: '', dZip: '',\n    dErrors: {},\n    // contact\n    cName: '', cEmail: '', cOrg: '', cReason: 'General inquiry', cMessage: '',\n    cErrors: {}, cSubmitted: false,\n    // events\n    evtType: 'All', evtSearch: '',\n    // newsletter\n    nlEmail: '', nlDone: false, nlError: '',\n  };\n\n  events = [\n    { id:1, title:'Kingston Digestive-Health Mission', date:'September 18–24, 2026', month:'SEP', day:'18', location:'Kingston, Jamaica', region:'Jamaica', type:'Medical Mission', status:'Recruiting clinicians', statusKind:'open', desc:'A week-long endoscopy and GI screening mission at a partner clinic, pairing visiting specialists with local providers.' },\n    { id:2, title:'Endoscopy Equipment Delivery', date:'August 12, 2026', month:'AUG', day:'12', location:'Georgetown, Guyana', region:'Guyana', type:'Equipment', status:'Scheduled', statusKind:'neutral', desc:'Shipment and on-site installation of refurbished endoscopy and diagnostic equipment for a regional hospital.' },\n    { id:3, title:'GI Triage & Referral Workshop', date:'October 9, 2026', month:'OCT', day:'09', location:'Port of Spain, Trinidad', region:'Trinidad', type:'Training', status:'Open registration', statusKind:'open', desc:'A one-day continuing-education workshop for nurses and community health workers on recognizing and triaging digestive disease.' },\n    { id:4, title:'Annual Caribbean Health Benefit', date:'November 14, 2026', month:'NOV', day:'14', location:'Orange, CT (in-person & virtual)', region:'United States', type:'Fundraiser', status:'Tickets available', statusKind:'open', desc:'Our founding-year benefit evening supporting the 2027 mission calendar. Sponsorship and individual tickets available.' },\n    { id:5, title:'Rural Outreach Screening Mission', date:'January 22–28, 2027', month:'JAN', day:'22', location:'St. Elizabeth, Jamaica', region:'Jamaica', type:'Medical Mission', status:'In planning', statusKind:'neutral', desc:'A mobile screening mission reaching rural parishes with limited access to specialty evaluation.' },\n    { id:6, title:'Continuing-Education Grant Cycle', date:'Applications due December 1, 2026', month:'DEC', day:'01', location:'Caribbean-wide', region:'Caribbean-wide', type:'Grant', status:'Accepting applications', statusKind:'open', desc:'Grant funding for Caribbean medical professionals pursuing training that strengthens local specialty care.' },\n  ];\n\n  reasons = ['Clinical volunteer inquiry','Institutional partnership','Donation inquiry','Board membership inquiry','Submit a testimonial','Request information packet','Media or press','General inquiry'];\n\n  componentDidMount() {\n    try {\n      this.mq = window.matchMedia('(max-width: 820px)');\n      this.onMq = (e) => this.setState({ isMobile: e.matches });\n      this.setState({ isMobile: this.mq.matches });\n      if (this.mq.addEventListener) this.mq.addEventListener('change', this.onMq);\n      else this.mq.addListener(this.onMq);\n    } catch(e) {}\n    try { if (localStorage.getItem('chf_newsletter')) this.setState({ nlDone: true }); } catch(e) {}\n  }\n  componentWillUnmount() {\n    try { if (this.mq) { if (this.mq.removeEventListener) this.mq.removeEventListener('change', this.onMq); else this.mq.removeListener(this.onMq); } } catch(e) {}\n  }\n\n  go(page) { this.setState({ page, mobileNav: false }); try { window.scrollTo(0,0); } catch(e){} }\n  toggleNav = () => this.setState(s => ({ mobileNav: !s.mobileNav }));\n  presetReason(reason) { this.setState({ page:'contact', cReason:reason, mobileNav:false, cSubmitted:false }); try { window.scrollTo(0,0); } catch(e){} }\n\n  fmt(n) { return '$' + Number(n || 0).toLocaleString('en-US'); }\n  effectiveAmount() { return this.state.dCustom ? Number(this.state.dCustom) : Number(this.state.dAmount); }\n\n  selectAmount = (a) => this.setState({ dAmount: a, dCustom: '', dErrors: {} });\n  setDCustom = (e) => { const n = e.target.value.replace(/\\D/g,'').slice(0,7); this.setState({ dCustom: n, dAmount: n ? Number(n) : 0, dErrors: {} }); };\n  setFreq = (f) => this.setState({ dFreq: f });\n  toggleDedicate = () => this.setState(s => ({ dDedicate: !s.dDedicate }));\n  setDedicateName = (e) => this.setState({ dDedicateName: e.target.value });\n\n  setDName = (e) => this.setState({ dName: e.target.value });\n  setDEmail = (e) => this.setState({ dEmail: e.target.value });\n  setDCard = (e) => { let v = e.target.value.replace(/\\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim(); this.setState({ dCard: v }); };\n  setDExp = (e) => { let v = e.target.value.replace(/\\D/g,'').slice(0,4); if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2); this.setState({ dExp: v }); };\n  setDCvc = (e) => this.setState({ dCvc: e.target.value.replace(/\\D/g,'').slice(0,4) });\n  setDZip = (e) => this.setState({ dZip: e.target.value.replace(/\\D/g,'').slice(0,6) });\n\n  donateNext = () => {\n    if (this.effectiveAmount() < 1) { this.setState({ dErrors: { amount: 'Please choose or enter an amount.' } }); return; }\n    this.setState({ dStep: 2, dErrors: {} }); try { window.scrollTo(0,0); } catch(e){}\n  };\n  donateBack = () => { this.setState({ dStep: 1, dErrors: {} }); try { window.scrollTo(0,0); } catch(e){} };\n  donateSubmit = () => {\n    const s = this.state; const e = {};\n    if (!s.dName.trim()) e.dName = 'Please enter the name on the card.';\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(s.dEmail)) e.dEmail = 'Please enter a valid email for your receipt.';\n    if (s.dCard.replace(/\\s/g,'').length < 13) e.dCard = 'Please enter a valid card number.';\n    if (!/^\\d{2}\\/\\d{2}$/.test(s.dExp)) e.dExp = 'MM/YY';\n    if (!/^\\d{3,4}$/.test(s.dCvc)) e.dCvc = 'CVC';\n    if (!/^\\d{4,6}$/.test(s.dZip)) e.dZip = 'ZIP';\n    if (Object.keys(e).length) { this.setState({ dErrors: e }); return; }\n    this.setState({ dStep: 3, dErrors: {} }); try { window.scrollTo(0,0); } catch(e){}\n  };\n  donateReset = () => this.setState({ dStep:1, dFreq:'one-time', dAmount:100, dCustom:'', dDedicate:false, dDedicateName:'', dName:'', dEmail:'', dCard:'', dExp:'', dCvc:'', dZip:'', dErrors:{} });\n\n  setCName = (e) => this.setState({ cName: e.target.value });\n  setCEmail = (e) => this.setState({ cEmail: e.target.value });\n  setCOrg = (e) => this.setState({ cOrg: e.target.value });\n  setCReason = (e) => this.setState({ cReason: e.target.value });\n  setCMessage = (e) => this.setState({ cMessage: e.target.value });\n  submitContact = () => {\n    const s = this.state; const e = {};\n    if (!s.cName.trim()) e.cName = 'Please enter your name.';\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(s.cEmail)) e.cEmail = 'Please enter a valid email address.';\n    if (!s.cMessage.trim() || s.cMessage.trim().length < 10) e.cMessage = 'Please share a few details (at least 10 characters).';\n    if (Object.keys(e).length) { this.setState({ cErrors: e }); return; }\n    this.setState({ cSubmitted: true, cErrors: {} }); try { window.scrollTo(0,0); } catch(e){}\n  };\n  resetContact = () => this.setState({ cSubmitted:false, cName:'', cEmail:'', cOrg:'', cReason:'General inquiry', cMessage:'', cErrors:{} });\n\n  setEvtType = (t) => this.setState({ evtType: t });\n  setEvtSearch = (e) => this.setState({ evtSearch: e.target.value });\n\n  setNlEmail = (e) => this.setState({ nlEmail: e.target.value, nlError: '' });\n  submitNewsletter = () => {\n    const s = this.state;\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(s.nlEmail)) { this.setState({ nlError: 'Please enter a valid email.' }); return; }\n    try { localStorage.setItem('chf_newsletter', s.nlEmail); } catch(e) {}\n    this.setState({ nlDone: true, nlError: '' });\n  };\n\n  statusStyle(kind) {\n    const base = { fontSize:'0.78rem', padding:'0.2rem 0.7rem', borderRadius:'999px', fontWeight:500, whiteSpace:'nowrap' };\n    if (kind === 'open') return { ...base, background:'#f0f9f4', color:'#1e6e4d', border:'1px solid #c5e7d3' };\n    return { ...base, background:'#f4f7fb', color:'#1b3766', border:'1px solid #d7e0ee' };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const accent = this.props.accentColor || '#b8860b';\n    const eff = this.effectiveAmount();\n    const types = ['All','Medical Mission','Training','Equipment','Fundraiser','Grant'];\n    const q = s.evtSearch.trim().toLowerCase();\n    const filteredEvents = this.events.filter(ev => {\n      const typeOk = s.evtType === 'All' || ev.type === s.evtType;\n      const searchOk = !q || (ev.title + ' ' + ev.location + ' ' + ev.desc + ' ' + ev.region).toLowerCase().includes(q);\n      return typeOk && searchOk;\n    }).map(ev => ({ ...ev, statusStyle: this.statusStyle(ev.statusKind) }));\n\n    const typeChips = types.map(t => ({\n      label: t,\n      onClick: () => this.setEvtType(t),\n      style: {\n        background: s.evtType === t ? '#0a1f3d' : '#fff',\n        color: s.evtType === t ? '#fff' : '#374151',\n        border: s.evtType === t ? '1px
