  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rs with clinicians and local providers to bring high-quality medical care, equipment, and training to underserved communities across the Caribbean.<\u002Fp>\n        <div style=\"display:flex;gap:0.75rem;flex-wrap:wrap;\">\n          <button onclick=\"{{ goInvolve }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 1.85rem;cursor:pointer;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Support Our Work<\u002Fbutton>\n          <button onclick=\"{{ goPrograms }}\" style=\"background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.35);border-radius:3px;font-size:0.92rem;padding:0.85rem 1.85rem;cursor:pointer;\" style-hover=\"border-color:#fff;background:rgba(255,255,255,0.06);\">Explore Our Programs<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"background:#fff;border-bottom:1px solid #e5e7eb;\">\n      <div style=\"max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));\">\n        <div style=\"padding:2.25rem clamp(1.25rem,3vw,2rem);border-right:1px solid #e5e7eb;\"><span style=\"font-family:'IBM Plex Serif',serif;font-size:2.1rem;font-weight:500;color:#0a1f3d;display:block;letter-spacing:-0.02em;\">2024<\u002Fspan><span style=\"font-size:0.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.4rem;display:block;font-weight:500;\">Year Founded<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:2.25rem clamp(1.25rem,3vw,2rem);border-right:1px solid #e5e7eb;\"><span style=\"font-family:'IBM Plex Serif',serif;font-size:2.1rem;font-weight:500;color:#0a1f3d;display:block;letter-spacing:-0.02em;\">501(c)(3)<\u002Fspan><span style=\"font-size:0.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.4rem;display:block;font-weight:500;\">Tax-Deductible Status<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:2.25rem clamp(1.25rem,3vw,2rem);border-right:1px solid #e5e7eb;\"><span style=\"font-family:'IBM Plex Serif',serif;font-size:2.1rem;font-weight:500;color:#0a1f3d;display:block;letter-spacing:-0.02em;\">4<\u002Fspan><span style=\"font-size:0.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.4rem;display:block;font-weight:500;\">Core Programs<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:2.25rem clamp(1.25rem,3vw,2rem);\"><span style=\"font-family:'IBM Plex Serif',serif;font-size:2.1rem;font-weight:500;color:#0a1f3d;display:block;letter-spacing:-0.02em;\">Caribbean<\u002Fspan><span style=\"font-size:0.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.4rem;display:block;font-weight:500;\">Region Served<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,5rem) clamp(1.25rem,4vw,2rem);\">\n      <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>What We Do<\u002Fp>\n      <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.5rem,2.8vw,2rem);font-weight:500;line-height:1.25;margin:0 0 1.1rem;color:#0a1f3d;letter-spacing:-0.015em;max-width:720px;\">A focused model for closing gaps in Caribbean medical care.<\u002Fh2>\n      <p style=\"color:#374151;max-width:660px;line-height:1.75;margin:0 0 3rem;font-size:1rem;\">Founded in 2024 by gastroenterologist Dr. Gyanprakash Ketwaroo, CaribHealth concentrates resources where they create durable change: direct clinical missions, the equipment to sustain them, and the training and grants that let local providers carry the work forward.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem;\">\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-top:2px solid #0a1f3d;padding:1.85rem;transition:border-top-color 0.2s;\" style-hover=\"border-top-color:var(--accent,#b8860b);\">\n          <div style=\"color:#0a1f3d;margin-bottom:1.1rem;\"><svg width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" viewBox=\"0 0 24 24\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z\"><\u002Fpath><path d=\"M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;margin:0 0 0.5rem;color:#0a1f3d;\">Medical Missions<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0;\">Volunteer clinical teams deliver screenings, consultations, and procedures — with founding strength in digestive health — at partner sites across the Caribbean.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-top:2px solid #0a1f3d;padding:1.85rem;transition:border-top-color 0.2s;\" style-hover=\"border-top-color:var(--accent,#b8860b);\">\n          <div style=\"color:#0a1f3d;margin-bottom:1.1rem;\"><svg width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" viewBox=\"0 0 24 24\"><path d=\"M3 7h18M5 7v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M12 11v6M9 14h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;margin:0 0 0.5rem;color:#0a1f3d;\">Equipment Donation<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0;\">Sourcing, refurbishing, and shipping diagnostic and procedural equipment to clinics operating with limited infrastructure.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-top:2px solid #0a1f3d;padding:1.85rem;transition:border-top-color 0.2s;\" style-hover=\"border-top-color:var(--accent,#b8860b);\">\n          <div style=\"color:#0a1f3d;margin-bottom:1.1rem;\"><svg width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" viewBox=\"0 0 24 24\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z\"><\u002Fpath><path d=\"M22 10v6\"><\u002Fpath><path d=\"M6 12.5V16a6 3 0 0 0 12 0v-3.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;margin:0 0 0.5rem;color:#0a1f3d;\">Training &amp; Education<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0;\">Hands-on workshops and continuing education that build local capacity in symptom recognition, triage, and procedure technique.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-top:2px solid #0a1f3d;padding:1.85rem;transition:border-top-color 0.2s;\" style-hover=\"border-top-color:var(--accent,#b8860b);\">\n          <div style=\"color:#0a1f3d;margin-bottom:1.1rem;\"><svg width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" viewBox=\"0 0 24 24\"><path d=\"M12 3l8 4v5c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V7l8-4z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;margin:0 0 0.5rem;color:#0a1f3d;\">Training Grants<\u002Fh3>\n          <p style=\"font-size:0.9rem;color:#374151;line-height:1.65;margin:0;\">Grants that fund the education of medical professionals who serve — or are preparing to serve — communities across the Caribbean.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:2.25rem;\"><button onclick=\"{{ goPrograms }}\" style=\"background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.88rem;font-weight:500;padding:0.7rem 1.5rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">See how each program works →<\u002Fbutton><\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"background:#f4f7fb;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"max-width:840px;margin:0 auto;text-align:center;\">\n        <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1.25rem;text-align:center;\">Why It Matters<\u002Fp>\n        <div style=\"display:inline-flex;align-items:center;gap:0.5rem;background:#fff7ed;border:1px solid #fdba74;border-radius:999px;padding:0.3rem 0.85rem;margin:0 0 1.25rem;\"><span style=\"font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a3412;\">Placeholder<\u002Fspan><span style=\"font-size:0.76rem;color:#9a3412;\">Interim quote — pending Dr.&nbsp;Ketwaroo’s approved words<\u002Fspan><\u002Fdiv>\n        <blockquote style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.15rem,2.2vw,1.45rem);color:#0a1f3d;max-width:700px;margin:0 auto 1.25rem;line-height:1.55;font-weight:400;\">“Across much of the Caribbean, conditions routinely managed elsewhere go undiagnosed for years. Closing that gap is not charity — it is equity.”<\u002Fblockquote>\n        <cite style=\"font-size:0.82rem;color:#6b7280;font-style:normal;letter-spacing:0.04em;text-transform:uppercase;\">Dr. Gyanprakash Ketwaroo · Founder &amp; President<\u002Fcite>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,5rem) clamp(1.25rem,4vw,2rem);\">\n      <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Our First-Year Goals<\u002Fp>\n      <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.5rem,2.8vw,2rem);font-weight:500;line-height:1.25;margin:0 0 1.25rem;color:#0a1f3d;letter-spacing:-0.015em;max-width:680px;\">What your support helps us reach.<\u002Fh2>\n      <div style=\"display:flex;align-items:flex-start;gap:0.6rem;background:#fff7ed;border:1px solid #fdba74;border-radius:4px;padding:0.8rem 1rem;margin:0 0 2.5rem;max-width:680px;\"><span style=\"font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#9a3412;color:#fff7ed;border-radius:3px;padding:0.2rem 0.5rem;white-space:nowrap;flex-shrink:0;\">Placeholder<\u002Fspan><span style=\"font-size:0.83rem;color:#9a3412;line-height:1.5;\">Illustrative first-year targets shown as examples — to be replaced with board-approved goals.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem;\">\n        <div style=\"border-left:3px solid var(--accent,#b8860b);padding:0.25rem 0 0.25rem 1.25rem;\"><div style=\"font-family:'IBM Plex Serif',serif;font-size:1.9rem;color:#0a1f3d;font-weight:500;\">1st<\u002Fdiv><p style=\"font-size:0.9rem;color:#374151;margin:0.35rem 0 0;line-height:1.6;\">Inaugural digestive-health mission to a Caribbean partner site.<\u002Fp><\u002Fdiv>\n        <div style=\"border-left:3px solid var(--accent,#b8860b);padding:0.25rem 0 0.25rem 1.25rem;\"><div style=\"font-family:'IBM Plex Serif',serif;font-size:1.9rem;color:#0a1f3d;font-weight:500;\">2<\u002Fdiv><p style=\"font-size:0.9rem;color:#374151;margin:0.35rem 0 0;line-height:1.6;\">Partner clinics equipped with donated diagnostic tools.<\u002Fp><\u002Fdiv>\n        <div style=\"border-left:3px solid var(--accent,#b8860b);padding:0.25rem 0 0.25rem 1.25rem;\"><div style=\"font-family:'IBM Plex Serif',serif;font-size:1.9rem;color:#0a1f3d;font-weight:500;\">$25K<\u002Fdiv><p style=\"font-size:0.9rem;color:#374151;margin:0.35rem 0 0;line-height:1.6;\">Founding campaign goal to fund missions and supplies.<\u002Fp><\u002Fdiv>\n        <div style=\"border-left:3px solid var(--accent,#b8860b);padding:0.25rem 0 0.25rem 1.25rem;\"><div style=\"font-family:'IBM Plex Serif',serif;font-size:1.9rem;color:#0a1f3d;font-weight:500;\">3+<\u002Fdiv><p style=\"font-size:0.9rem;color:#374151;margin:0.35rem 0 0;line-height:1.6;\">Local providers trained through workshops and grants.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:0 clamp(1.25rem,4vw,2rem) clamp(3.5rem,6vw,5.5rem);\">\n      <div style=\"background:linear-gradient(135deg,#0a1f3d,#11294a);color:#fff;border-radius:4px;padding:clamp(2.5rem,4vw,3.5rem);text-align:center;\">\n        <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.4rem,2.6vw,1.9rem);font-weight:500;margin:0 auto 1rem;max-width:560px;\">Your contribution directly funds patient care.<\u002Fh2>\n        <p style=\"margin:0 auto 2rem;max-width:520px;color:rgba(255,255,255,0.8);line-height:1.7;\">Gifts support medical supplies, mission logistics, and training for our partner communities. Every dollar is tax-deductible.<\u002Fp>\n        <button onclick=\"{{ goInvolve }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.95rem;font-weight:500;padding:0.9rem 2.25rem;cursor:pointer;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Make a Donation<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== ABOUT ===================== -->\n  <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"About\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> About<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">About CaribHealth Foundation<\u002Fh1>\n        <p style=\"max-width:660px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">A Connecticut 501(c)(3) charitable organization, incorporated in 2024 to facilitate and promote access to high-quality medical care across the Caribbean — with a focus on underserved and indigent populations.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(2.5rem,5vw,4rem);align-items:start;\">\n        <div>\n          <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Our Mission<\u002Fp>\n          <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.5rem,2.6vw,1.95rem);font-weight:500;line-height:1.25;margin:0 0 1.25rem;color:#0a1f3d;letter-spacing:-0.015em;\">Reducing disparities in specialty care.<\u002Fh2>\n          <p style=\"color:#374151;line-height:1.75;margin:0 0 1.1rem;font-size:0.97rem;\">CaribHealth Foundation exists to close a measurable gap: across much of the Caribbean, conditions routinely managed in higher-resource settings go undiagnosed or untreated for years. Our model focuses on direct clinical service, the equipment to sustain it, and the training and grants that build lasting local capacity.<\u002Fp>\n          <p style=\"color:#374151;line-height:1.75;margin:0 0 1.1rem;font-size:0.97rem;\">The Foundation grew from the clinical observations of its founder, gastroenterologist Dr. Gyanprakash Ketwaroo, during work in the region. It was incorporated in Connecticut in March 2024 and recognized as a 501(c)(3) tax-exempt organization the same year.<\u002Fp>\n          <p style=\"color:#374151;line-height:1.75;margin:0;font-size:0.97rem;\">We are a small organization by design — keeping administrative costs minimal so that resources reach patients and partner providers.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Our Principles<\u002Fp>\n          <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.5rem,2.6vw,1.95rem);font-weight:500;line-height:1.25;margin:0 0 1.75rem;color:#0a1f3d;letter-spacing:-0.015em;\">What guides our work.<\u002Fh2>\n          <div style=\"padding:1.25rem 0;border-bottom:1px solid #e5e7eb;\"><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.05rem;font-weight:600;color:#0a1f3d;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.6rem;\"><span style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;font-weight:500;\">01<\u002Fspan> Patient dignity<\u002Fh3><p style=\"color:#374151;line-height:1.65;margin:0;font-size:0.92rem;\">Every patient is entitled to respectful, evidence-based care regardless of geography or means.<\u002Fp><\u002Fdiv>\n          <div style=\"padding:1.25rem 0;border-bottom:1px solid #e5e7eb;\"><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.05rem;font-weight:600;color:#0a1f3d;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.6rem;\"><span style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;font-weight:500;\">02<\u002Fspan> Local partnership<\u002Fh3><p style=\"color:#374151;line-height:1.65;margin:0;font-size:0.92rem;\">We work alongside local clinicians and community health workers. Our role is to support and strengthen, not to replace.<\u002Fp><\u002Fdiv>\n          <div style=\"padding:1.25rem 0;border-bottom:1px solid #e5e7eb;\"><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.05rem;font-weight:600;color:#0a1f3d;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.6rem;\"><span style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;font-weight:500;\">03<\u002Fspan> Financial transparency<\u002Fh3><p style=\"color:#374151;line-height:1.65;margin:0;font-size:0.92rem;\">Program outcomes and financials are made available to the public. Donor trust is foundational to our work.<\u002Fp><\u002Fdiv>\n          <div style=\"padding:1.25rem 0;\"><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.05rem;font-weight:600;color:#0a1f3d;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.6rem;\"><span style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.9rem;font-weight:500;\">04<\u002Fspan> Evidence-based practice<\u002Fh3><p style=\"color:#374151;line-height:1.65;margin:0;font-size:0.92rem;\">Our clinical and educational programs follow established standards of care and are continuously evaluated.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"background:#f9fafb;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;padding:clamp(2.75rem,5vw,4rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1.75rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Organization Facts<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;\">\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Legal Name<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">CaribHealth Foundation, Inc.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Tax Status<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">501(c)(3) · EIN 99-2604475<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Incorporated<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">Connecticut · March 2024<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Principal Office<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">Orange, New Haven County, CT<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Fiscal Year<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">January 1 – December 31<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:0.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;\">Classification<\u002Fdiv><div style=\"font-size:0.95rem;color:#0a1f3d;font-weight:500;\">Grantmaking &amp; Giving (NAICS 813219)<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"background:#0a1f3d;color:#fff;padding:clamp(2rem,4vw,2.75rem);border-radius:4px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.5rem;\">\n        <div style=\"max-width:560px;\">\n          <h2 style=\"font-family:'IBM Plex Serif',serif;color:#fff;font-size:clamp(1.3rem,2.2vw,1.6rem);font-weight:500;margin:0 0 0.6rem;\">See exactly how your support is put to work.<\u002Fh2>\n          <p style=\"color:rgba(255,255,255,0.75);line-height:1.7;margin:0;font-size:0.95rem;\">Explore the four programs that turn contributions into care, equipment, and trained providers across the Caribbean.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ goPrograms }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 1.85rem;cursor:pointer;white-space:nowrap;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">View Programs<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== PROGRAMS ===================== -->\n  <sc-if value=\"{{ isPrograms }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Programs\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Programs<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Our programs<\u002Fh1>\n        <p style=\"max-width:680px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">Four interlocking programs — defined in our charter — turn contributions into direct care, durable infrastructure, and a stronger local health workforce across the Caribbean.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);display:flex;flex-direction:column;gap:1.5rem;\">\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0;border:1px solid #e5e7eb;background:#fff;\">\n        <div style=\"background:#0a1f3d;color:#fff;padding:clamp(1.75rem,3vw,2.5rem);display:flex;flex-direction:column;justify-content:center;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.95rem;margin-bottom:0.75rem;\">Program 01<\u002Fdiv>\n          <svg width=\"34\" height=\"34\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" viewBox=\"0 0 24 24\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:1rem;opacity:0.9;\"><path d=\"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z\"><\u002Fpath><path d=\"M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27\"><\u002Fpath><\u002Fsvg>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.3rem;font-weight:500;margin:0 0 0.5rem;\">Medical Missions<\u002Fh3>\n          <p style=\"color:rgba(255,255,255,0.72);font-size:0.9rem;line-height:1.6;margin:0;\">Direct, hands-on care at partner sites.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(1.75rem,3vw,2.5rem);\">\n          <p style=\"color:#374151;line-height:1.75;font-size:0.97rem;margin:0 0 1.25rem;\">Volunteer clinical teams travel to partner sites across the Caribbean to deliver screenings, consultations, and procedures — with founding strength in digestive health and endoscopy. Every mission pairs visiting specialists with local providers so that knowledge stays in the community after the team departs.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem;\">\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">GI screening &amp; endoscopy<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Consultations<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Bedside teaching<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0;border:1px solid #e5e7eb;background:#fff;\">\n        <div style=\"background:#0a1f3d;color:#fff;padding:clamp(1.75rem,3vw,2.5rem);display:flex;flex-direction:column;justify-content:center;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.95rem;margin-bottom:0.75rem;\">Program 02<\u002Fdiv>\n          <svg width=\"34\" height=\"34\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" viewBox=\"0 0 24 24\" style=\"margin-bottom:1rem;opacity:0.9;\"><path d=\"M3 7h18M5 7v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M12 11v6M9 14h6\"><\u002Fpath><\u002Fsvg>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.3rem;font-weight:500;margin:0 0 0.5rem;\">Equipment Donation<\u002Fh3>\n          <p style=\"color:rgba(255,255,255,0.72);font-size:0.9rem;line-height:1.6;margin:0;\">The tools that make care possible.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(1.75rem,3vw,2.5rem);\">\n          <p style=\"color:#374151;line-height:1.75;font-size:0.97rem;margin:0 0 1.25rem;\">We source, refurbish, and ship endoscopic and diagnostic equipment, medications, and supplies to clinics operating with limited infrastructure. On-site installation and orientation ensure that donated equipment is used safely and stays in service.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem;\">\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Endoscopy systems<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Diagnostics<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Consumables<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0;border:1px solid #e5e7eb;background:#fff;\">\n        <div style=\"background:#0a1f3d;color:#fff;padding:clamp(1.75rem,3vw,2.5rem);display:flex;flex-direction:column;justify-content:center;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.95rem;margin-bottom:0.75rem;\">Program 03<\u002Fdiv>\n          <svg width=\"34\" height=\"34\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" viewBox=\"0 0 24 24\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:1rem;opacity:0.9;\"><path d=\"M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z\"><\u002Fpath><path d=\"M22 10v6\"><\u002Fpath><path d=\"M6 12.5V16a6 3 0 0 0 12 0v-3.5\"><\u002Fpath><\u002Fsvg>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.3rem;font-weight:500;margin:0 0 0.5rem;\">Training &amp; Education<\u002Fh3>\n          <p style=\"color:rgba(255,255,255,0.72);font-size:0.9rem;line-height:1.6;margin:0;\">Building lasting local capacity.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(1.75rem,3vw,2.5rem);\">\n          <p style=\"color:#374151;line-height:1.75;font-size:0.97rem;margin:0 0 1.25rem;\">Workshops and continuing education equip local clinicians and community health workers to recognize, triage, and refer digestive and other conditions earlier. Training is delivered alongside missions and as standalone sessions, with curricula adapted to each partner site.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem;\">\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Symptom recognition<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Triage &amp; referral<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Procedure technique<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0;border:1px solid #e5e7eb;background:#fff;\">\n        <div style=\"background:#0a1f3d;color:#fff;padding:clamp(1.75rem,3vw,2.5rem);display:flex;flex-direction:column;justify-content:center;\">\n          <div style=\"font-family:'IBM Plex Serif',serif;color:var(--accent,#b8860b);font-size:0.95rem;margin-bottom:0.75rem;\">Program 04<\u002Fdiv>\n          <svg width=\"34\" height=\"34\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" viewBox=\"0 0 24 24\" style=\"margin-bottom:1rem;opacity:0.9;\"><path d=\"M12 3l8 4v5c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V7l8-4z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n          <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.3rem;font-weight:500;margin:0 0 0.5rem;\">Training Grants<\u002Fh3>\n          <p style=\"color:rgba(255,255,255,0.72);font-size:0.9rem;line-height:1.6;margin:0;\">Investing in the next generation.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(1.75rem,3vw,2.5rem);\">\n          <p style=\"color:#374151;line-height:1.75;font-size:0.97rem;margin:0 0 1.25rem;\">Grants support the education and training of medical professionals who serve — or are preparing to serve — communities across the Caribbean. By funding the people who stay, we extend the impact of every mission far beyond a single visit.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem;\">\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Continuing education<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Specialty training<\u002Fspan>\n            <span style=\"font-size:0.78rem;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:999px;padding:0.3rem 0.85rem;\">Caribbean-wide<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:0 clamp(1.25rem,4vw,2rem) clamp(3.5rem,6vw,5rem);\">\n      <div style=\"background:#f4f7fb;border:1px solid #e5e7eb;border-radius:4px;padding:clamp(2rem,4vw,3rem);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.5rem;\">\n        <div style=\"max-width:560px;\">\n          <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 0.75rem;\">Ready When You Are<\u002Fp>\n          <h2 style=\"font-family:'IBM Plex Serif',serif;color:#0a1f3d;font-size:clamp(1.3rem,2.2vw,1.6rem);font-weight:500;margin:0 0 0.5rem;\">Fund a program or join a mission.<\u002Fh2>\n          <p style=\"color:#374151;line-height:1.7;margin:0;font-size:0.95rem;\">Whether you give, volunteer clinical time, or partner an institution, there is a clear way to plug in.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:0.75rem;flex-wrap:wrap;\">\n          <button onclick=\"{{ goInvolve }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.9rem;font-weight:500;padding:0.8rem 1.6rem;cursor:pointer;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Donate<\u002Fbutton>\n          <button onclick=\"{{ goEvents }}\" style=\"background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.9rem;font-weight:500;padding:0.8rem 1.6rem;cursor:pointer;\" style-hover=\"background:#0a1f3d;color:#fff;\">View Missions<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== BOARD ===================== -->\n  <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Board\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Board &amp; Governance<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Board of Directors<\u002Fh1>\n        <p style=\"max-width:660px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">Our directors provide strategic governance and clinical oversight, serving voluntarily under the Foundation’s bylaws.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);\">\n      <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Leadership<\u002Fp>\n      <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.5rem,2.8vw,2rem);font-weight:500;line-height:1.25;margin:0 0 0.85rem;color:#0a1f3d;letter-spacing:-0.015em;\">Governance and clinical direction.<\u002Fh2>\n      <p style=\"color:#374151;max-width:640px;line-height:1.75;margin:0 0 1.25rem;font-size:1rem;\">CaribHealth Foundation is governed by a board of three directors named in its founding charter, who set strategy, approve budgets, and oversee program performance.<\u002Fp>\n      <div style=\"display:flex;align-items:flex-start;gap:0.6rem;background:#fff7ed;border:1px solid #fdba74;border-radius:4px;padding:0.8rem 1rem;margin:0 0 3rem;max-width:640px;\"><span style=\"font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#9a3412;color:#fff7ed;border-radius:3px;padding:0.2rem 0.5rem;white-space:nowrap;flex-shrink:0;\">Placeholder<\u002Fspan><span style=\"font-size:0.83rem;color:#9a3412;line-height:1.5;\">Director <strong>names and roles are accurate<\u002Fstrong>; the biography text below is interim placeholder copy, pending each director’s approved bio.<\u002Fspan><\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;\">\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:1.85rem;display:flex;gap:1.25rem;align-items:flex-start;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <img src=\"d0ce9c68-6cd6-48a3-b95c-b5eaf762b7ba\" alt=\"Dr. Gyanprakash Ketwaroo\" style=\"width:68px;height:68px;border-radius:50%;flex-shrink:0;object-fit:cover;object-position:center top;\">\n          <div style=\"flex:1;min-width:0;\">\n            <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;color:#0a1f3d;margin:0 0 0.2rem;line-height:1.3;\">Dr. Gyanprakash Ketwaroo, MD<\u002Fh3>\n            <div style=\"font-size:0.72rem;color:var(--accent,#b8860b);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.7rem;\">Founder, President &amp; Chair<\u002Fdiv>\n            <p style=\"font-size:0.9rem;color:#374151;line-height:1.6;margin:0;\">Board-certified gastroenterologist whose clinical work in the region inspired the Foundation. Provides medical direction, leads clinical partnerships, and serves as the registered agent.<\u002Fp>\n            <div style=\"font-size:0.78rem;color:#6b7280;margin-top:0.5rem;font-style:italic;\">Gastroenterology · Academic Medicine<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:1.85rem;display:flex;gap:1.25rem;align-items:flex-start;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <div style=\"width:68px;height:68px;border-radius:50%;flex-shrink:0;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:1.15rem;font-weight:600;color:#0a1f3d;\">WP<\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\">\n            <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;color:#0a1f3d;margin:0 0 0.2rem;line-height:1.3;\">Wellington Phillips<\u002Fh3>\n            <div style=\"font-size:0.72rem;color:var(--accent,#b8860b);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.7rem;\">Director &amp; Co-Founder<\u002Fdiv>\n            <p style=\"font-size:0.9rem;color:#374151;line-height:1.6;margin:0;\">A founding trustee of the Foundation. Contributes to strategy, partnership development, and oversight of program operations across the Caribbean.<\u002Fp>\n            <div style=\"font-size:0.78rem;color:#6b7280;margin-top:0.5rem;font-style:italic;\">Founding Trustee<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #e5e7eb;padding:1.85rem;display:flex;gap:1.25rem;align-items:flex-start;transition:border-color 0.15s;\" style-hover=\"border-color:#d1d5db;\">\n          <div style=\"width:68px;height:68px;border-radius:50%;flex-shrink:0;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:1.15rem;font-weight:600;color:#0a1f3d;\">RD<\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\">\n            <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.08rem;font-weight:600;color:#0a1f3d;margin:0 0 0.2rem;line-height:1.3;\">Ronald Dixon<\u002Fh3>\n            <div style=\"font-size:0.72rem;color:var(--accent,#b8860b);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.7rem;\">Director<\u002Fdiv>\n            <p style=\"font-size:0.9rem;color:#374151;line-height:1.6;margin:0;\">Serves on the board with responsibility for governance and financial stewardship, helping ensure the Foundation operates in accordance with its 501(c)(3) obligations.<\u002Fp>\n            <div style=\"font-size:0.78rem;color:#6b7280;margin-top:0.5rem;font-style:italic;\">Governance &amp; Stewardship<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:3rem;border:1px solid #e5e7eb;background:#f9fafb;border-radius:4px;padding:clamp(1.75rem,3vw,2.5rem);\">\n        <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 1.5rem;\">How We Govern<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;\">\n          <div><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1rem;color:#0a1f3d;margin:0 0 0.4rem;\">Officers<\u002Fh3><p style=\"font-size:0.88rem;color:#374151;line-height:1.6;margin:0;\">The board elects a President, Vice President, Secretary, and Treasurer to lead day-to-day governance.<\u002Fp><\u002Fdiv>\n          <div><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1rem;color:#0a1f3d;margin:0 0 0.4rem;\">Meetings<\u002Fh3><p style=\"font-size:0.88rem;color:#374151;line-height:1.6;margin:0;\">Directors convene at least three times per year, with a quorum of two required to act.<\u002Fp><\u002Fdiv>\n          <div><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1rem;color:#0a1f3d;margin:0 0 0.4rem;\">Committees<\u002Fh3><p style=\"font-size:0.88rem;color:#374151;line-height:1.6;margin:0;\">An Executive Committee and advisory committees support specific programs and initiatives.<\u002Fp><\u002Fdiv>\n          <div><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1rem;color:#0a1f3d;margin:0 0 0.4rem;\">Oversight<\u002Fh3><p style=\"font-size:0.88rem;color:#374151;line-height:1.6;margin:0;\">The Treasurer maintains financial records and reports regularly to the board for review.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#0a1f3d;color:#fff;padding:clamp(2rem,4vw,2.5rem);margin-top:3rem;border-radius:4px;\">\n        <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.7);font-weight:600;margin:0 0 1rem;\"><span style=\"display:inline-block;width:18px;height:1px;background:var(--accent,#b8860b);vertical-align:middle;margin-right:0.6rem;\"><\u002Fspan>Board Membership<\u002Fp>\n        <h2 style=\"font-family:'IBM Plex Serif',serif;color:#fff;font-size:clamp(1.3rem,2.2vw,1.6rem);font-weight:500;margin:0 0 0.75rem;\">Interested in serving on the board?<\u002Fh2>\n        <p style=\"color:rgba(255,255,255,0.75);max-width:560px;margin:0 0 1.5rem;line-height:1.7;\">As we grow, we welcome qualified candidates with backgrounds in medicine, public health, finance, law, or community development. Inquiries are reviewed by the board.<\u002Fp>\n        <button onclick=\"{{ boardInquiry }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 1.85rem;cursor:pointer;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Submit an Inquiry<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== STORIES ===================== -->\n  <sc-if value=\"{{ isStories }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Stories\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Stories<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Voices behind the work<\u002Fh1>\n        <p style=\"max-width:660px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">As a newly founded organization, our story begins with the people committing to it — our founder, volunteer clinicians, and partner providers. Their words speak to why CaribHealth exists.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"display:flex;align-items:flex-start;gap:0.7rem;background:#fff7ed;border:1px solid #fdba74;border-radius:4px;padding:1rem 1.15rem;margin:0 0 2.5rem;\"><span style=\"font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#9a3412;color:#fff7ed;border-radius:3px;padding:0.22rem 0.55rem;white-space:nowrap;flex-shrink:0;margin-top:1px;\">Interim<\u002Fspan><span style=\"font-size:0.88rem;color:#9a3412;line-height:1.55;\"><strong>Every quote and testimonial on this page is placeholder copy<\u002Fstrong> shown for layout only — not real statements from any named or unnamed person. They will be replaced with approved, attributed quotes before launch.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:#0a1f3d;color:#fff;padding:clamp(2.5rem,4vw,4rem) clamp(1.5rem,4vw,3rem);margin-bottom:3.5rem;position:relative;border-radius:4px;\">\n        <div style=\"width:34px;height:2px;background:var(--accent,#b8860b);margin-bottom:1.5rem;\"><\u002Fdiv>\n        <span style=\"display:inline-block;font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fde4cc;background:rgba(255,247,237,0.12);border:1px solid #b45309;border-radius:3px;padding:0.2rem 0.55rem;margin-bottom:1rem;\">Placeholder quote<\u002Fspan>\n        <blockquote style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.15rem,2.3vw,1.55rem);color:#fff;line-height:1.55;max-width:740px;margin:0 0 1.5rem;font-weight:400;\">“I have seen what early access to a specialist can mean for a patient in the Caribbean, and what its absence costs. CaribHealth exists to make that access ordinary rather than exceptional.”<\u002Fblockquote>\n        <cite style=\"font-size:0.8rem;color:rgba(255,255,255,0.6);font-style:normal;letter-spacing:0.04em;text-transform:uppercase;\">Dr. Gyanprakash Ketwaroo · Founder &amp; President<\u002Fcite>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;\"><h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.3rem;font-weight:500;color:#0a1f3d;margin:0;\">Why our volunteers are joining<\u002Fh3><span style=\"font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9a3412;background:#fff7ed;border:1px solid #fdba74;border-radius:3px;padding:0.2rem 0.55rem;\">Placeholder statements<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;\">\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-left:3px solid var(--accent,#b8860b);padding:1.85rem;\">\n          <blockquote style=\"font-family:'IBM Plex Serif',serif;font-size:0.98rem;line-height:1.7;color:#1f2937;margin:0 0 1.5rem;\">“The model is rigorous and the partnerships are genuine — visiting specialists working with local providers, not around them. That’s why I signed on for the first mission.”<\u002Fblockquote>\n          <div style=\"display:flex;align-items:center;gap:0.75rem;padding-top:1.25rem;border-top:1px solid #e5e7eb;\"><div style=\"width:40px;height:40px;border-radius:50%;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:0.85rem;font-weight:600;color:#0a1f3d;\">V<\u002Fdiv><div><div style=\"font-size:0.9rem;font-weight:500;color:#0a1f3d;\">Volunteer Physician<\u002Fdiv><div style=\"font-size:0.78rem;color:#6b7280;margin-top:2px;\">Joining 2026 mission<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-left:3px solid var(--accent,#b8860b);padding:1.85rem;\">\n          <blockquote style=\"font-family:'IBM Plex Serif',serif;font-size:0.98rem;line-height:1.7;color:#1f2937;margin:0 0 1.5rem;\">“As a student, the chance to support logistics and patient coordination on a real mission is rare. It grounds global-health work in actual patient impact.”<\u002Fblockquote>\n          <div style=\"display:flex;align-items:center;gap:0.75rem;padding-top:1.25rem;border-top:1px solid #e5e7eb;\"><div style=\"width:40px;height:40px;border-radius:50%;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:0.85rem;font-weight:600;color:#0a1f3d;\">S<\u002Fdiv><div><div style=\"font-size:0.9rem;font-weight:500;color:#0a1f3d;\">Student Volunteer<\u002Fdiv><div style=\"font-size:0.78rem;color:#6b7280;margin-top:2px;\">Logistics &amp; Outreach<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e5e7eb;border-left:3px solid var(--accent,#b8860b);padding:1.85rem;\">\n          <blockquote style=\"font-family:'IBM Plex Serif',serif;font-size:0.98rem;line-height:1.7;color:#1f2937;margin:0 0 1.5rem;\">“Our clinic has lacked the equipment and training for gastrointestinal care. A partnership like this is exactly what we need to serve our patients better.”<\u002Fblockquote>\n          <div style=\"display:flex;align-items:center;gap:0.75rem;padding-top:1.25rem;border-top:1px solid #e5e7eb;\"><div style=\"width:40px;height:40px;border-radius:50%;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:0.85rem;font-weight:600;color:#0a1f3d;\">P<\u002Fdiv><div><div style=\"font-size:0.9rem;font-weight:500;color:#0a1f3d;\">Partner Clinic Lead<\u002Fdiv><div style=\"font-size:0.78rem;color:#6b7280;margin-top:2px;\">Prospective partner site<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:clamp(1.75rem,3vw,2.5rem);margin-top:3rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.25rem;\">\n        <div style=\"max-width:560px;\">\n          <p style=\"font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1b3766;font-weight:600;margin:0 0 0.6rem;\">Share Your Experience<\u002Fp>\n          <h2 style=\"font-family:'IBM Plex Serif',serif;color:#0a1f3d;font-size:clamp(1.25rem,2.2vw,1.5rem);font-weight:500;margin:0 0 0.4rem;\">Part of our work, or want to be?<\u002Fh2>\n          <p style=\"color:#374151;line-height:1.7;margin:0;font-size:0.95rem;\">We welcome statements from volunteers, donors, and partners. Your account helps inform future contributors.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ shareStory }}\" style=\"background:#0a1f3d;color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 1.85rem;cursor:pointer;white-space:nowrap;\" style-hover=\"background:#11294a;\">Submit a Statement<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== EVENTS / MISSIONS ===================== -->\n  <sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Missions\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Missions &amp; Events<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Upcoming missions &amp; events<\u002Fh1>\n        <p style=\"max-width:660px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">Our calendar of clinical missions, training workshops, equipment deliveries, and fundraising events. Filter by type or search to find where you can help.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:1100px;margin:0 auto;padding:clamp(2.5rem,4vw,3.5rem) clamp(1.25rem,4vw,2rem);\">\n      <div style=\"display:flex;align-items:flex-start;gap:0.7rem;background:#fff7ed;border:1px solid #fdba74;border-radius:4px;padding:1rem 1.15rem;margin:0 0 1.75rem;\"><span style=\"font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#9a3412;color:#fff7ed;border-radius:3px;padding:0.22rem 0.55rem;white-space:nowrap;flex-shrink:0;margin-top:1px;\">Interim<\u002Fspan><span style=\"font-size:0.88rem;color:#9a3412;line-height:1.55;\"><strong>Sample schedule for layout only.<\u002Fstrong> These missions, dates, and locations are placeholders — to be replaced with the board’s confirmed mission calendar.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between;margin-bottom:1.5rem;\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem;\">\n          <sc-for list=\"{{ typeChips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"position:relative;flex:1;min-width:220px;max-width:320px;\">\n          <svg width=\"17\" height=\"17\" fill=\"none\" stroke=\"#9ca3af\" stroke-width=\"2\" viewBox=\"0 0 24 24\" style=\"position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);pointer-events:none;\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n          <input value=\"{{ evtSearch }}\" onchange=\"{{ setEvtSearch }}\" placeholder=\"Search missions, locations…\" style=\"width:100%;border:1px solid #d1d5db;border-radius:3px;font-size:0.9rem;padding:0.65rem 0.9rem 0.65rem 2.4rem;background:#fff;color:#1f2937;outline:none;\" style-focus=\"border-color:#0a1f3d;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasEvents }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:1rem;\">\n        <sc-for list=\"{{ filteredEvents }}\" as=\"ev\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:1.5rem;display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;\" style-hover=\"border-color:#d1d5db;\">\n            <div style=\"width:64px;flex-shrink:0;text-align:center;border:1px solid #e5e7eb;border-radius:4px;overflow:hidden;\">\n              <div style=\"background:#0a1f3d;color:#fff;font-size:0.68rem;letter-spacing:0.1em;padding:0.25rem 0;font-weight:600;\">{{ ev.month }}<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Serif',serif;font-size:1.5rem;color:#0a1f3d;padding:0.35rem 0;font-weight:500;\">{{ ev.day }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:200px;\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:0.6rem;align-items:center;margin-bottom:0.5rem;\">\n                <span style=\"font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:#1b3766;background:#f4f7fb;border:1px solid #d7e0ee;border-radius:3px;padding:0.18rem 0.6rem;font-weight:600;\">{{ ev.type }}<\u002Fspan>\n                <span style=\"{{ ev.statusStyle }}\">{{ ev.status }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-family:'IBM Plex Serif',serif;font-size:1.12rem;font-weight:600;color:#0a1f3d;margin:0 0 0.3rem;\">{{ ev.title }}<\u002Fh3>\n              <div style=\"font-size:0.85rem;color:#6b7280;margin-bottom:0.6rem;display:flex;flex-wrap:wrap;gap:0.5rem 1.1rem;\"><span>📅 {{ ev.date }}<\u002Fspan><span>📍 {{ ev.location }}<\u002Fspan><\u002Fdiv>\n              <p style=\"font-size:0.9rem;color:#374151;line-height:1.6;margin:0;\">{{ ev.desc }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;\">\n              <button onclick=\"{{ volunteerInquiry }}\" style=\"background:#fff;color:#0a1f3d;border:1px solid #0a1f3d;border-radius:3px;font-size:0.85rem;font-weight:500;padding:0.6rem 1.2rem;cursor:pointer;white-space:nowrap;\" style-hover=\"background:#0a1f3d;color:#fff;\">Get Involved<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noEvents }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:3.5rem 1rem;border:1px dashed #d1d5db;border-radius:4px;color:#6b7280;\">\n          <p style=\"font-size:0.98rem;margin:0 0 0.3rem;color:#374151;font-weight:500;\">No events match your filters.<\u002Fp>\n          <p style=\"font-size:0.88rem;margin:0;\">Try a different category or clear your search.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"margin-top:2.5rem;background:#f4f7fb;border:1px solid #e5e7eb;border-radius:4px;padding:clamp(1.75rem,3vw,2.25rem);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.25rem;\">\n        <div style=\"max-width:560px;\">\n          <h2 style=\"font-family:'IBM Plex Serif',serif;color:#0a1f3d;font-size:clamp(1.2rem,2vw,1.45rem);font-weight:500;margin:0 0 0.4rem;\">Want to host or sponsor a mission?<\u002Fh2>\n          <p style=\"color:#374151;line-height:1.7;margin:0;font-size:0.95rem;\">Clinics, institutions, and donors can help us add dates to this calendar.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ partnerInquiry }}\" style=\"background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.92rem;font-weight:500;padding:0.85rem 1.85rem;cursor:pointer;white-space:nowrap;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Partner With Us<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== GET INVOLVED ===================== -->\n  <sc-if value=\"{{ isInvolve }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Get Involved\" style=\"\">\n    <div style=\"background:#f4f7fb;border-bottom:1px solid #e5e7eb;padding:clamp(2.5rem,4vw,4rem) clamp(1.25rem,4vw,2rem) clamp(2.25rem,4vw,3.5rem);\">\n      <div style=\"max-width:1100px;margin:0 auto;\">\n        <div style=\"font-size:0.78rem;color:#6b7280;margin-bottom:1rem;letter-spacing:0.04em;\">Home <span style=\"color:#9ca3af;margin:0 0.4rem;\">/<\u002Fspan> Get Involved<\u002Fdiv>\n        <h1 style=\"font-family:'IBM Plex Serif',serif;font-size:clamp(1.85rem,3.5vw,2.5rem);font-weight:500;color:#0a1f3d;margin:0 0 0.85rem;letter-spacing:-0.02em;line-height:1.2;\">Get involved<\u002Fh1>\n        <p style=\"max-width:660px;color:#374151;line-height:1.7;font-size:1rem;margin:0;\">Give, volunteer clinical time, or partner your institution — every form of support extends our capacity to serve patients across the Caribbean.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"max-width:660px;margin:0 auto;padding:clamp(3rem,5vw,4.5rem) clamp(1.25rem,4vw,2rem) clamp(2rem,3vw,3rem);\">\n      <div style=\"background:#fff;border:1px solid #e5e7eb;border-radius:6px;box-shadow:0 8px 30px rgba(10,31,61,0.06);overflow:hidden;\">\n        <div style=\"background:linear-gradient(135deg,#0a1f3d,#11294a);color:#fff;padding:1.5rem clamp(1.5rem,3vw,2rem);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;\">\n            <div>\n              <div style=\"font-family:'IBM Plex Serif',serif;font-size:1.25rem;font-weight:500;\">Make a donation<\u002Fdiv>\n              <div style=\"font-size:0.82rem;color:rgba(255,255,255,0.7);margin-top:0.2rem;\">Tax-deductible · 501(c)(3) · EIN 99-2604475<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:0.4rem;\">\n              <div style=\"{{ stepDot1 }}\">1<\u002Fdiv>\n              <div style=\"width:14px;height:1px;background:rgba(255,255,255,0.3);\"><\u002Fdiv>\n              <div style=\"{{ stepDot2 }}\">2<\u002Fdiv>\n              <div style=\"width:14px;height:1px;background:rgba(255,255,255,0.3);\"><\u002Fdiv>\n              <div style=\"{{ stepDot3 }}\">✓<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:clamp(1.5rem,3vw,2.25rem);\">\n          <!-- STEP 1 -->\n          <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"display:flex;background:#f3f4f6;border-radius:4px;padding:0.25rem;margin-bottom:1.5rem;\">\n              <button onclick=\"{{ setFreqOne }}\" style=\"{{ freqStyleOne }}\">One-time<\u002Fbutton>\n              <button onclick=\"{{ setFreqMonthly }}\" style=\"{{ freqStyleMonthly }}\">Monthly<\u002Fbutton>\n            <\u002Fdiv>\n            <label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.6rem;color:#374151;\">Choose an amount<\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:0.75rem;\">\n              <sc-for list=\"{{ amountPills }}\" as=\"pill\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ pill.onClick }}\" style=\"{{ pill.style }}\">{{ pill.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"{{ customWrapStyle }}\">\n              <span style=\"color:#6b7280;font-size:0.95rem;\">$<\u002Fspan>\n              <input value=\"{{ dCustom }}\" onchange=\"{{ setDCustom }}\" placeholder=\"Other amount\" inputmode=\"numeric\" style=\"flex:1;border:none;outline:none;padding:0.7rem 0;font-size:0.95rem;background:transparent;color:#1f2937;\">\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasErrAmount }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.8rem;color:#d9534f;margin:0.6rem 0 0;\">{{ errAmount }}<\u002Fp><\u002Fsc-if>\n\n            <div onclick=\"{{ toggleDedicate }}\" style=\"display:flex;align-items:center;gap:0.6rem;margin-top:1.5rem;cursor:pointer;\">\n              <div style=\"{{ dedicateBox }}\"><sc-if value=\"{{ dDedicate }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#fff;font-size:0.7rem;\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <span style=\"font-size:0.88rem;color:#374151;\">Dedicate this gift in honor or memory of someone<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ dDedicate }}\" hint-placeholder-val=\"{{ false }}\">\n              <input value=\"{{ dDedicateName }}\" onchange=\"{{ setDedicateName }}\" placeholder=\"In honor of…\" style=\"width:100%;margin-top:0.75rem;border:1px solid #d1d5db;border-radius:3px;font-size:0.92rem;padding:0.7rem 0.9rem;outline:none;color:#1f2937;\" style-focus=\"border-color:#0a1f3d;\">\n            <\u002Fsc-if>\n\n            <div style=\"margin-top:1.5rem;padding:0.85rem 1rem;background:#fff7ed;border:1px solid #fdba74;border-radius:4px;font-size:0.83rem;color:#9a3412;line-height:1.55;\"><span style=\"font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:1px solid #fdba74;border-radius:3px;padding:0.12rem 0.45rem;margin-right:0.5rem;\">Placeholder<\u002Fspan>Example goal for layout — the {{ goalLabel }} founding-campaign target is illustrative, pending the board’s confirmed figure.<\u002Fdiv>\n\n            <button onclick=\"{{ donateNext }}\" style=\"width:100%;margin-top:1.5rem;background:var(--accent,#b8860b);color:#fff;border:none;border-radius:3px;font-size:0.98rem;font-weight:500;padding:0.95rem;cursor:pointer;\" style-hover=\"background:color-mix(in srgb, var(--accent,#b8860b) 82%, black);\">Continue — {{ effAmountLabel }}{{ freqLabel }} →<\u002Fbutton>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- STEP 2 -->\n          <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1rem;background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:1.5rem;\">\n              <div><div style=\"font-size:0.75rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;\">{{ summaryFreqLabel }} gift<\u002Fdiv><div style=\"font-family:'IBM Plex Serif',serif;font-size:1.4rem;color:#0a1f3d;font-weight:500;\">{{ effAmountLabel }}{{ freqLabel }}<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ donateBack }}\" style=\"background:none;border:none;color:#1b3766;font-size:0.84rem;cursor:pointer;text-decoration:underline;\">Edit<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Name on card <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><input value=\"{{ dName }}\" onchange=\"{{ setDName }}\" placeholder=\"Full name\" style=\"{{ dNameStyle }}\"><sc-if value=\"{{ hasErrDName }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#d9534f;margin:0.35rem 0 0;\">{{ errDName }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Email for receipt <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><input value=\"{{ dEmail }}\" onchange=\"{{ setDEmail }}\" placeholder=\"you@example.com\" style=\"{{ dEmailStyle }}\"><sc-if value=\"{{ hasErrDEmail }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:0.78rem;color:#d9534f;margin:0.35rem 0 0;\">{{ errDEmail }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n            <div style=\"margin-bottom:1.1rem;\"><label style=\"display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.4rem;color:#374151;\">Card number <span style=\"color:var(--accent,#b8860b);\">*<\u002Fspan><\u002Flabel><input value=\"{{ dCard }}\" onchange=\"{{ setDCard }}\" placeholder=\"1234 5678 9012 34
